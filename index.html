<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Michi Console Radio PRO</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:monospace;
    background:linear-gradient(270deg,#0f2027,#203a43,#2c5364,#1a2a6c);
    background-size:600% 600%;
    animation:bgMove 12s infinite;
}

@keyframes bgMove{
    0%{background-position:0%}
    50%{background-position:100%}
    100%{background-position:0%}
}

/* CONSOLA */
.console{
    width:90%;
    max-width:500px;
    background:#0b0b12;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 0 40px rgba(0,255,200,0.2);
}

/* HEADER */
.header{
    padding:12px;
    display:flex;
    gap:10px;
}

/* FOCOS */
.dot{
    width:12px;
    height:12px;
    border-radius:50%;
    animation:beat 1s infinite;
}

.red{background:#ff5f56;}
.yellow{background:#ffbd2e; animation-delay:0.2s;}
.green{background:#27c93f; animation-delay:0.4s;}

@keyframes beat{
    0%,100%{transform:scale(1);opacity:1;}
    50%{transform:scale(1.4);opacity:0.5;}
}

/* TERMINAL */
.code{
    padding:20px;
    min-height:150px;
    color:#00ffc3;
    text-shadow:0 0 8px #00ffc3;
}

/* BOTÓN */
.controls{
    display:flex;
    justify-content:center;
    padding:20px;
}

.play-btn{
    width:70px;
    height:70px;
    border-radius:50%;
    background:#00ffc3;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    transition:0.3s;
}

.icon{
    width:0;
    height:0;
    border-left:20px solid #000;
    border-top:12px solid transparent;
    border-bottom:12px solid transparent;
}

/* PAUSE */
.playing .icon{
    width:20px;
    height:20px;
    border:none;
    position:relative;
}

.playing .icon::before,
.playing .icon::after{
    content:'';
    position:absolute;
    width:6px;
    height:20px;
    background:#000;
}

.playing .icon::before{left:0;}
.playing .icon::after{right:0;}

/* PULSO */
.playing{
    animation:pulse 1s infinite;
}

@keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(0,255,195,0.6);}
    70%{box-shadow:0 0 0 20px rgba(0,255,195,0);}
    100%{box-shadow:0 0 0 0 rgba(0,255,195,0);}
}
</style>
</head>

<body>

<div class="console">

    <div class="header">
        <div class="dot red"></div>
        <div class="dot yellow"></div>
        <div class="dot green"></div>
    </div>

    <div class="code" id="terminal"></div>

    <div class="controls">
        <div class="play-btn" id="btn" onclick="toggleRadio()">
            <div class="icon"></div>
        </div>
    </div>

</div>

<audio id="radio" src="https://stream-178.zeno.fm/f3wvbbqmdg8uv"></audio>

<script>
/* TEXTO ANIMADO */
const text = `
{
  "status": true,
  "radio": "Michi 24/7",
  "mode": "live streaming",
  "signal": "strong"
}
`;

let i = 0;
const terminal = document.getElementById("terminal");

function typing(){
    if(i < text.length){
        terminal.innerHTML += text.charAt(i);
        i++;
        setTimeout(typing, 25);
    }
}
typing();

/* RADIO */
const radio = document.getElementById("radio");
const btn = document.getElementById("btn");

function toggleRadio(){
    if(radio.paused){
        radio.play();
        btn.classList.add("playing");
    }else{
        radio.pause();
        btn.classList.remove("playing");
    }
}
</script>

</body>
</html>
